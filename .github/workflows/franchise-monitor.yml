name: 特许鹰眼两小时监控

on:
  schedule:
    # UTC 每 2 小时运行一次（北京时间 = UTC + 8）
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest responses

      - name: 运行单元测试
        run: |
          python -m pytest tests/ -v --tb=short

      - name: 拉取云端状态
        env:
          STATE_REPO: ${{ secrets.STATE_REPO || 'C-ReCaLl/franchise-sentinel-state' }}
          GITHUB_TOKEN: ${{ secrets.STATE_REPO_TOKEN }}
        run: |
          python state_sync.py pull

      - name: 运行特许经营法律风险监控
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: |
          python franchise_monitor.py --once

      - name: 回写云端状态
        if: always()
        env:
          STATE_REPO: ${{ secrets.STATE_REPO || 'C-ReCaLl/franchise-sentinel-state' }}
          GITHUB_TOKEN: ${{ secrets.STATE_REPO_TOKEN }}
        run: |
          python state_sync.py push
