name: CI 质量门

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest responses

      - name: 语法检查
        run: |
          python -m py_compile franchise_monitor.py
          python -m py_compile state_sync.py

      - name: 运行单元测试
        run: |
          python -m pytest tests/ -v --tb=short

      - name: 干跑测试
        run: |
          python franchise_monitor.py --once --dry-run
