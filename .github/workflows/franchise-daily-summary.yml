name: 特许鹰眼每日简报

on:
  schedule:
    # UTC 01:00 = 北京时间 09:00
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  daily-summary:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest responses

      - name: 运行单元测试
        run: |
          python -m pytest tests/ -v --tb=short

      - name: 拉取云端状态
        env:
          STATE_REPO: ${{ secrets.STATE_REPO || 'C-ReCaLl/franchise-sentinel-state' }}
          GITHUB_TOKEN: ${{ secrets.STATE_REPO_TOKEN }}
        run: |
          python state_sync.py pull

      - name: 推送每日简报
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: |
          python franchise_monitor.py --daily-summary

      - name: 回写云端状态
        if: always()
        env:
          STATE_REPO: ${{ secrets.STATE_REPO || 'C-ReCaLl/franchise-sentinel-state' }}
          GITHUB_TOKEN: ${{ secrets.STATE_REPO_TOKEN }}
        run: |
          python state_sync.py push
